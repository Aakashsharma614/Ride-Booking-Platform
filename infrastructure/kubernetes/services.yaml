apiVersion: v1
kind: ConfigMap
metadata:
  name: ride-platform-config
data:
  KAFKA_BROKERS: kafka:9092
  REDIS_URL: redis://redis:6379
  MONGO_URI: mongodb://mongo:27017/ride_platform
---
apiVersion: v1
kind: Secret
metadata:
  name: ride-platform-secrets
type: Opaque
stringData:
  JWT_SECRET: change-me-in-cluster
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels: { app: api-gateway }
  template:
    metadata:
      labels: { app: api-gateway }
    spec:
      containers:
        - name: api-gateway
          image: ride/api-gateway:latest
          ports: [{ containerPort: 8080 }]
          envFrom:
            - configMapRef: { name: ride-platform-config }
            - secretRef: { name: ride-platform-secrets }
          readinessProbe: { httpGet: { path: /readyz, port: 8080 } }
          livenessProbe: { httpGet: { path: /healthz, port: 8080 } }
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  selector: { app: api-gateway }
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65

