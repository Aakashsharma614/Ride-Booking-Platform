services:
  api-gateway:
    build:
      context: ..
      dockerfile: Dockerfile
    environment: &service_env
      MONGO_URI: mongodb://mongo:27017/ride_platform
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      JWT_SECRET: local-dev-secret
      RIDER_SERVICE_URL: http://rider-service:8101
      DRIVER_SERVICE_URL: http://driver-service:8102
      RIDE_SERVICE_URL: http://ride-service:8105
      PRICING_SERVICE_URL: http://pricing-service:8106
      PAYMENT_SERVICE_URL: http://payment-service:8107
      NOTIFICATION_SERVICE_URL: http://notification-service:8108
      ANALYTICS_SERVICE_URL: http://analytics-service:8109
      LOCATION_SERVICE_URL: http://location-service:8103
      MATCHING_SERVICE_URL: http://matching-service:8104
      WORKSPACE: "@ride/api-gateway"
    ports: ["8080:8080"]
    depends_on: [mongo, redis, kafka]
  rider-service:
    build: { context: .., dockerfile: Dockerfile }
    environment: { <<: *service_env, WORKSPACE: "@ride/rider-service" }
    ports: ["8101:8101"]
    depends_on: [mongo, redis, kafka]
  driver-service:
    build: { context: .., dockerfile: Dockerfile }
    environment: { <<: *service_env, WORKSPACE: "@ride/driver-service" }
    ports: ["8102:8102"]
    depends_on: [mongo, redis, kafka]
  location-service:
    build: { context: .., dockerfile: Dockerfile }
    environment: { <<: *service_env, WORKSPACE: "@ride/location-service" }
    ports: ["8103:8103"]
    depends_on: [mongo, redis, kafka]
  matching-service:
    build: { context: .., dockerfile: Dockerfile }
    environment: { <<: *service_env, WORKSPACE: "@ride/matching-service" }
    ports: ["8104:8104"]
    depends_on: [mongo, redis, kafka]
  ride-service:
    build: { context: .., dockerfile: Dockerfile }
    environment: { <<: *service_env, WORKSPACE: "@ride/ride-service" }
    ports: ["8105:8105"]
    depends_on: [mongo, redis, kafka]
  pricing-service:
    build: { context: .., dockerfile: Dockerfile }
    environment: { <<: *service_env, WORKSPACE: "@ride/pricing-service" }
    ports: ["8106:8106"]
    depends_on: [mongo, redis, kafka]
  payment-service:
    build: { context: .., dockerfile: Dockerfile }
    environment: { <<: *service_env, WORKSPACE: "@ride/payment-service" }
    ports: ["8107:8107"]
    depends_on: [mongo, redis, kafka]
  notification-service:
    build: { context: .., dockerfile: Dockerfile }
    environment: { <<: *service_env, WORKSPACE: "@ride/notification-service" }
    ports: ["8108:8108"]
    depends_on: [mongo, redis, kafka]
  analytics-service:
    build: { context: .., dockerfile: Dockerfile }
    environment: { <<: *service_env, WORKSPACE: "@ride/analytics-service" }
    ports: ["8109:8109"]
    depends_on: [mongo, redis, kafka]
  mongo:
    image: mongo:7
    ports: ["27017:27017"]
    volumes: ["mongo-data:/data/db"]
  redis:
    image: redis:7
    ports: ["6379:6379"]
  kafka:
    image: apache/kafka:latest
    ports: ["9092:9092"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
  prometheus:
    image: prom/prometheus:v2.53.0
    ports: ["9090:9090"]
    volumes: ["./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro"]
  grafana:
    image: grafana/grafana:11.0.0
    ports: ["3001:3000"]
  jaeger:
    image: jaegertracing/all-in-one:1.58
    ports: ["16686:16686", "4318:4318"]
volumes:
  mongo-data:
